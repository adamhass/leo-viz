<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>LEO Viz</title>
    <script>
        (function () {
            var path = window.location.pathname.replace(/\/+$/, "");
            var route = null;
            if (path.endsWith("/demo")) {
                route = "demo";
            } else if (path.endsWith("/presentation")) {
                route = "presentation";
            }

            if (route) {
                var base = path.slice(0, path.length - route.length - 1);
                window.location.replace(base + "/?route=" + route);
            } else {
                window.location.replace("/");
            }
        })();
    </script>
</head>
<body></body>
</html>
