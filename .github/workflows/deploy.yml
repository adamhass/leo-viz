name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Fetch presentation assets
        run: |
          git lfs install --local --force
          git lfs pull --include="assets/presentations/**" --exclude="textures/**"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0

      - name: Strip native-only path dependencies
        # These live in a sibling repo and are only used behind
        # cfg(not(target_arch = "wasm32")), but `cargo metadata` still
        # reads the paths. Drop the lines for the WASM deploy build.
        run: |
          sed -i '/^leodos-lib42 = /d' Cargo.toml
          sed -i '/^leodos-bridge = /d' Cargo.toml

      - name: Build
        run: trunk build --release --cargo-profile release-wasm --public-url /leo-viz/

      - name: Add route entrypoints
        run: |
          mkdir -p dist/demo dist/presentation
          cp dist/index.html dist/demo/index.html
          cp dist/index.html dist/presentation/index.html

      - name: Check deployed slides are real SVGs
        run: |
          if grep -R "version https://git-lfs.github.com/spec/v1" dist/spacecomp-primer; then
            echo "Presentation slides were deployed as Git LFS pointers" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
